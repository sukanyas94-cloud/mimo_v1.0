<!doctype html>
<html><head><meta charset="utf-8"><title>Radius & Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }
  .group { display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; }
  .sample { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { width: 76px; height: 56px; background: #FFFFFF; border: 1px solid var(--border); }
  .name { font-size: 11px; font-weight: 600; color: var(--ink-1); }
  .meta { font-size: 10px; color: var(--ink-3); font-variant-numeric: tabular-nums; }
  .label { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; margin-bottom: 4px; }
</style>
</head><body>
  <div>
    <div class="label">Radius</div>
    <div class="group">
      <div class="sample"><div class="box" style="border-radius:6px"></div><div class="name">sm</div><div class="meta">6</div></div>
      <div class="sample"><div class="box" style="border-radius:10px"></div><div class="name">md</div><div class="meta">10</div></div>
      <div class="sample"><div class="box" style="border-radius:14px"></div><div class="name">lg</div><div class="meta">14</div></div>
      <div class="sample"><div class="box" style="border-radius:20px"></div><div class="name">xl</div><div class="meta">20</div></div>
      <div class="sample"><div class="box" style="border-radius:999px;width:56px"></div><div class="name">full</div><div class="meta">999</div></div>
    </div>
  </div>
  <div>
    <div class="label">Elevation</div>
    <div class="group">
      <div class="sample"><div class="box" style="box-shadow:none;border-radius:10px"></div><div class="name">elev-0</div></div>
      <div class="sample"><div class="box" style="box-shadow:0 1px 2px rgba(20,20,18,0.04);border-radius:10px"></div><div class="name">elev-1</div></div>
      <div class="sample"><div class="box" style="box-shadow:0 6px 16px -4px rgba(20,20,18,0.08);border-radius:10px"></div><div class="name">elev-2</div></div>
      <div class="sample"><div class="box" style="box-shadow:0 18px 40px -12px rgba(20,20,18,0.12);border-radius:10px"></div><div class="name">elev-3</div></div>
    </div>
  </div>
</body></html>
