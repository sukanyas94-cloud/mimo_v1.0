<!doctype html>
<html><head><meta charset="utf-8"><title>Empty State</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px 24px; display: flex; justify-content: center; }
  .empty { max-width: 320px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .glyph { width: 56px; height: 56px; border-radius: 14px; background: #F2E6DA; color: #8B5A3C; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 4px; }
  .glyph svg { width: 26px; height: 26px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .head { font-size: 22px; font-weight: 600; color: #1A1A18; line-height: 1.25; letter-spacing: -0.01em; margin: 0; }
  .body { font-size: 14px; color: #5C5B56; line-height: 1.5; margin: 0; }
  .cta { margin-top: 8px; display: inline-flex; align-items: center; gap: 8px; height: 44px; padding: 0 18px; background: #1A1A18; color: #FFFFFF; border: 0; border-radius: 10px; font-size: 15px; font-weight: 500; font-family: var(--font-sans); cursor: pointer; }
  .cta svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head><body>
  <div class="empty">
    <div class="glyph">
      <svg viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
    </div>
    <h2 class="head">Start saving links to build your memory space.</h2>
    <p class="body">Anything you save here stays findable later — even when you can't remember the exact title.</p>
    <button class="cta">
      <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      Save your first link
    </button>
  </div>
</body></html>
