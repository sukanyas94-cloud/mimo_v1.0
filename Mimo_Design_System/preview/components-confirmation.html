<!doctype html>
<html><head><meta charset="utf-8"><title>Save Confirmation Sheet</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 24px; background: rgba(20,20,18,0.32); }
  .sheet { background: #FFFFFF; border-radius: 20px; box-shadow: 0 18px 40px -12px rgba(20,20,18,0.12); padding: 18px 18px 16px; max-width: 360px; margin: 0 auto; }
  .grabber { width: 36px; height: 4px; border-radius: 999px; background: #DAD7CE; margin: 0 auto 14px; }
  .row { display: flex; align-items: center; gap: 8px; }
  .check { width: 28px; height: 28px; border-radius: 999px; background: #E8EFE7; color: #4F7A52; display: inline-flex; align-items: center; justify-content: center; }
  .check svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .saved { font-size: 15px; font-weight: 600; color: #1A1A18; }
  .preview { display: flex; gap: 12px; margin-top: 14px; padding: 12px; background: #F5F4EF; border-radius: 12px; }
  .thumb { width: 56px; height: 56px; border-radius: 8px; background: linear-gradient(135deg,#B5A88C,#7A6B4E); flex-shrink: 0; }
  .ptitle { font-size: 14px; font-weight: 600; color: #1A1A18; line-height: 1.3; }
  .pmeta  { font-size: 12px; color: #8C8B83; margin-top: 2px; }
  .actions { display: flex; gap: 8px; margin-top: 14px; }
  .btn { flex: 1; height: 42px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid transparent; font-family: var(--font-sans); }
  .btn-primary { background: #1A1A18; color: #FFFFFF; }
  .btn-secondary { background: transparent; color: #1A1A18; border-color: #DAD7CE; }
</style>
</head><body>
  <div class="sheet">
    <div class="grabber"></div>
    <div class="row">
      <div class="check"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></div>
      <div class="saved">Saved.</div>
    </div>
    <div class="preview">
      <div class="thumb"></div>
      <div>
        <div class="ptitle">Aesop Marrakech eau de toilette</div>
        <div class="pmeta">aesop.com</div>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-secondary">Undo</button>
      <button class="btn btn-primary">View memory</button>
    </div>
  </div>
</body></html>
