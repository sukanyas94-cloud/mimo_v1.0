<!doctype html>
<html><head><meta charset="utf-8"><title>Brand · Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; }
  .row { display: flex; align-items: center; gap: 32px; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  .swatch .label { font-size: 11px; color: var(--ink-3); letter-spacing: 0.04em; text-transform: uppercase; }
  .light { background: var(--bg); border: 1px solid var(--border); border-radius: 14px; padding: 18px 22px; }
  .dark  { background: #1A1A18; border-radius: 14px; padding: 18px 22px; }
  .mono  { background: var(--bg); border: 1px solid var(--border); border-radius: 14px; padding: 12px; }
  .dark img.invert { filter: brightness(0) invert(1); opacity: 0.95; }
</style>
</head><body>
  <div class="row">
    <div class="swatch">
      <div class="light"><img src="../assets/logo-wordmark.svg" alt="Mimo" height="40"></div>
      <div class="label">Wordmark · Umber</div>
    </div>
    <div class="swatch">
      <div class="light"><img src="../assets/logo-wordmark-ink.svg" alt="Mimo" height="40"></div>
      <div class="label">Wordmark · Ink</div>
    </div>
    <div class="swatch">
      <div class="dark"><img src="../assets/logo-wordmark-ink.svg" alt="Mimo" height="40" class="invert"></div>
      <div class="label">On Dark</div>
    </div>
    <div class="swatch">
      <div class="mono"><img src="../assets/logo-monogram.svg" alt="M" height="56" width="56"></div>
      <div class="label">App Mark</div>
    </div>
  </div>
</body></html>
