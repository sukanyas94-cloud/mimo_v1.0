<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; }
  .row { display: flex; align-items: center; gap: 14px; padding: 4px 0; }
  .bar { background: #8B5A3C; height: 10px; border-radius: 999px; }
  .name { font-size: 12px; font-weight: 600; color: var(--ink-1); width: 88px; font-variant-numeric: tabular-nums; }
  .px   { font-size: 11px; color: var(--ink-3); font-variant-numeric: tabular-nums; width: 36px; }
</style>
</head><body>
  <div class="row"><div class="name">space-4</div><div class="bar" style="width:4px"></div><div class="px">4</div></div>
  <div class="row"><div class="name">space-8</div><div class="bar" style="width:8px"></div><div class="px">8</div></div>
  <div class="row"><div class="name">space-12</div><div class="bar" style="width:12px"></div><div class="px">12</div></div>
  <div class="row"><div class="name">space-16</div><div class="bar" style="width:16px"></div><div class="px">16</div></div>
  <div class="row"><div class="name">space-20</div><div class="bar" style="width:20px"></div><div class="px">20</div></div>
  <div class="row"><div class="name">space-24</div><div class="bar" style="width:24px"></div><div class="px">24</div></div>
  <div class="row"><div class="name">space-32</div><div class="bar" style="width:32px"></div><div class="px">32</div></div>
  <div class="row"><div class="name">space-40</div><div class="bar" style="width:40px"></div><div class="px">40</div></div>
  <div class="row"><div class="name">space-56</div><div class="bar" style="width:56px"></div><div class="px">56</div></div>
  <div class="row"><div class="name">space-80</div><div class="bar" style="width:80px"></div><div class="px">80</div></div>
</body></html>
