<!doctype html>
<html><head><meta charset="utf-8"><title>Colors · Neutrals · Light & Dark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 22px; }
  .pane { margin-bottom: 18px; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 4px; }
  .chip { aspect-ratio: 1.4 / 1; border-radius: 8px; border: 1px solid rgba(0,0,0,0.08); }
  .name { font-size: 11px; font-weight: 600; color: var(--ink-1); }
  .hex  { font-size: 10px; color: var(--ink-3); font-variant-numeric: tabular-nums; }
  .label { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; margin-bottom: 8px; }
</style>
</head><body>
  <div class="pane">
    <div class="label">Light</div>
    <div class="grid">
      <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="name">bg</div><div class="hex">#FFFFFF</div></div>
      <div class="sw"><div class="chip" style="background:#F5F4EF"></div><div class="name">quiet</div><div class="hex">#F5F4EF</div></div>
      <div class="sw"><div class="chip" style="background:#EDECE6"></div><div class="name">press</div><div class="hex">#EDECE6</div></div>
      <div class="sw"><div class="chip" style="background:#ECEAE3"></div><div class="name">border</div><div class="hex">#ECEAE3</div></div>
      <div class="sw"><div class="chip" style="background:#8C8B83"></div><div class="name">ink-3</div><div class="hex">#8C8B83</div></div>
      <div class="sw"><div class="chip" style="background:#5C5B56"></div><div class="name">ink-2</div><div class="hex">#5C5B56</div></div>
      <div class="sw"><div class="chip" style="background:#1A1A18"></div><div class="name">ink-1</div><div class="hex">#1A1A18</div></div>
    </div>
  </div>
  <div class="pane">
    <div class="label">Dark</div>
    <div class="grid">
      <div class="sw"><div class="chip" style="background:#121211"></div><div class="name">bg</div><div class="hex">#121211</div></div>
      <div class="sw"><div class="chip" style="background:#1B1B19"></div><div class="name">surface</div><div class="hex">#1B1B19</div></div>
      <div class="sw"><div class="chip" style="background:#232220"></div><div class="name">quiet</div><div class="hex">#232220</div></div>
      <div class="sw"><div class="chip" style="background:#2A2926"></div><div class="name">border</div><div class="hex">#2A2926</div></div>
      <div class="sw"><div class="chip" style="background:#8C8B83"></div><div class="name">ink-3</div><div class="hex">#8C8B83</div></div>
      <div class="sw"><div class="chip" style="background:#B5B3AA"></div><div class="name">ink-2</div><div class="hex">#B5B3AA</div></div>
      <div class="sw"><div class="chip" style="background:#F2F0E9"></div><div class="name">ink-1</div><div class="hex">#F2F0E9</div></div>
    </div>
  </div>
</body></html>
