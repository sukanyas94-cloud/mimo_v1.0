<!doctype html>
<html><head><meta charset="utf-8"><title>Chips & Tags</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .label { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; margin-right: 6px; min-width: 96px; }
  .chip { display: inline-flex; align-items: center; gap: 6px; height: 28px; padding: 0 12px; border-radius: 999px; font-size: 12px; font-weight: 500; border: 1px solid transparent; }
  .ic { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .chip-neutral { background: #F1EFE9; color: #5C5B56; }
  .chip-human   { background: #F5EBD9; color: #6B4E1F; border-color: #E8D7BB; }
  .chip-system  { background: #E9EEF3; color: #34526E; border-color: #D2DCE7; }
  .filter-chip { display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 14px; border-radius: 999px; font-size: 13px; font-weight: 500; background: #FFFFFF; color: #1A1A18; border: 1px solid #DAD7CE; cursor: pointer; }
  .filter-chip.active { background: #1A1A18; color: #FFFFFF; border-color: #1A1A18; }
</style>
</head><body>
  <div class="row">
    <div class="label">Source</div>
    <span class="chip chip-neutral">
      <svg class="ic" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
      Instagram
    </span>
    <span class="chip chip-neutral">
      <svg class="ic" viewBox="0 0 24 24"><path d="M2.5 17a24 24 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49 49 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24 24 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49 49 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/></svg>
      YouTube
    </span>
    <span class="chip chip-neutral">
      <svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      tablethotels.com
    </span>
  </div>
  <div class="row">
    <div class="label">Context</div>
    <span class="chip chip-human">
      <svg class="ic" viewBox="0 0 24 24"><path d="M16 3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2 1 1 0 0 1 1 1v1a2 2 0 0 1-2 2 1 1 0 0 0-1 1v2a1 1 0 0 0 1 1 6 6 0 0 0 6-6V5a2 2 0 0 0-2-2z"/><path d="M5 3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2 1 1 0 0 1 1 1v1a2 2 0 0 1-2 2 1 1 0 0 0-1 1v2a1 1 0 0 0 1 1 6 6 0 0 0 6-6V5a2 2 0 0 0-2-2z"/></svg>
      You noted
    </span>
    <span class="chip chip-system">
      <svg class="ic" viewBox="0 0 24 24"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.582a.5.5 0 0 1 0 .962L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></svg>
      Mimo thinks
    </span>
  </div>
  <div class="row">
    <div class="label">Filter</div>
    <span class="filter-chip active">All</span>
    <span class="filter-chip">Articles</span>
    <span class="filter-chip">Videos</span>
    <span class="filter-chip">Products</span>
    <span class="filter-chip">Places</span>
  </div>
</body></html>
