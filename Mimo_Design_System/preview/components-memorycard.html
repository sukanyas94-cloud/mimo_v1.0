<!doctype html>
<html><head><meta charset="utf-8"><title>Memory Card · Variants</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
  .card { background: #FFFFFF; border: 1px solid #ECEAE3; border-radius: 14px; box-shadow: 0 1px 2px rgba(20,20,18,0.04); overflow: hidden; }
  .thumb { aspect-ratio: 16/9; background: linear-gradient(135deg,#E6DCC8 0%,#C7B595 100%); position: relative; box-shadow: inset 0 0 0 1px rgba(20,20,18,0.04); }
  .thumb.video { background: linear-gradient(160deg,#3C4858 0%, #1A1F26 100%); display: flex; align-items: center; justify-content: center; color: #FFFFFF; }
  .thumb.fallback { background: #F5F4EF; display: flex; align-items: center; justify-content: center; color: #B5B3AA; }
  .pad { padding: 14px 16px 16px; }
  .title { font-size: 15px; font-weight: 600; color: #1A1A18; line-height: 1.3; margin: 0 0 6px; }
  .meta { font-size: 12px; color: #8C8B83; font-variant-numeric: tabular-nums; }
  .badges { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .chip { display: inline-flex; align-items: center; gap: 4px; height: 22px; padding: 0 8px; border-radius: 999px; font-size: 11px; font-weight: 500; border: 1px solid transparent; }
  .ic { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .chip-human   { background: #F5EBD9; color: #6B4E1F; border-color: #E8D7BB; }
  .chip-system  { background: #E9EEF3; color: #34526E; border-color: #D2DCE7; }
  .compact { display: flex; gap: 12px; padding: 10px; align-items: center; }
  .compact .t { width: 64px; height: 64px; aspect-ratio: 1; border-radius: 8px; flex-shrink: 0; }
  .compact .body { min-width: 0; }
  .compact .title { font-size: 14px; }
</style>
</head><body>
  <article class="card">
    <div class="thumb"></div>
    <div class="pad">
      <h3 class="title">A weekend in Higashiyama, Kyoto</h3>
      <div class="meta">instagram.com · 14 Apr</div>
      <div class="badges">
        <span class="chip chip-human">
          <svg class="ic" viewBox="0 0 24 24"><path d="M16 3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2 1 1 0 0 1 1 1v1a2 2 0 0 1-2 2 1 1 0 0 0-1 1v2a1 1 0 0 0 1 1 6 6 0 0 0 6-6V5a2 2 0 0 0-2-2z"/><path d="M5 3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2 1 1 0 0 1 1 1v1a2 2 0 0 1-2 2 1 1 0 0 0-1 1v2a1 1 0 0 0 1 1 6 6 0 0 0 6-6V5a2 2 0 0 0-2-2z"/></svg>
          You noted
        </span>
        <span class="chip chip-system">
          <svg class="ic" viewBox="0 0 24 24"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.582a.5.5 0 0 1 0 .962L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>
          Travel reference
        </span>
      </div>
    </div>
  </article>

  <article class="card">
    <div class="thumb video">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>
    </div>
    <div class="pad">
      <h3 class="title">10-minute kettlebell finisher</h3>
      <div class="meta">YouTube · 4:32 · 22 Mar</div>
      <div class="badges">
        <span class="chip chip-system">
          <svg class="ic" viewBox="0 0 24 24"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.582a.5.5 0 0 1 0 .962L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>
          Workout to try
        </span>
      </div>
    </div>
  </article>

  <article class="card">
    <div class="thumb fallback">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
    </div>
    <div class="pad">
      <h3 class="title">Why I switched to plain text notes</h3>
      <div class="meta">jsomers.net · 02 Feb</div>
    </div>
  </article>

  <article class="card compact">
    <div class="t" style="background:linear-gradient(135deg,#B5A88C,#7A6B4E)"></div>
    <div class="body">
      <h3 class="title">Aesop Marrakech eau de toilette</h3>
      <div class="meta">aesop.com · 12 Jan</div>
      <div class="badges">
        <span class="chip chip-human">
          <svg class="ic" viewBox="0 0 24 24"><path d="M16 3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2 1 1 0 0 1 1 1v1a2 2 0 0 1-2 2 1 1 0 0 0-1 1v2a1 1 0 0 0 1 1 6 6 0 0 0 6-6V5a2 2 0 0 0-2-2z"/><path d="M5 3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2 1 1 0 0 1 1 1v1a2 2 0 0 1-2 2 1 1 0 0 0-1 1v2a1 1 0 0 0 1 1 6 6 0 0 0 6-6V5a2 2 0 0 0-2-2z"/></svg>
          You noted
        </span>
      </div>
    </div>
  </article>
</body></html>
