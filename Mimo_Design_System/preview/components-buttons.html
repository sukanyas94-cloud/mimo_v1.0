<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .label { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; min-width: 80px; }
  .btn { display: inline-flex; align-items: center; gap: 8px; height: 44px; padding: 0 18px; font-family: var(--font-sans); font-size: 15px; font-weight: 500; border-radius: 10px; border: 1px solid transparent; cursor: pointer; transition: background 160ms cubic-bezier(0.2,0,0.2,1); }
  .ic { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .btn-primary    { background: #1A1A18; color: #FFFFFF; }
  .btn-secondary  { background: #FFFFFF; color: #1A1A18; border-color: #DAD7CE; }
  .btn-ghost      { background: transparent; color: #1A1A18; }
  .btn-accent     { background: #8B5A3C; color: #FFFFFF; }
  .btn-danger     { background: transparent; color: #A14437; border-color: transparent; }
  .btn-disabled   { opacity: 0.42; cursor: not-allowed; }
  .btn-sm { height: 32px; padding: 0 12px; font-size: 13px; border-radius: 8px; }
  .btn-sm .ic { width: 13px; height: 13px; }
</style>
</head><body>
  <div class="row">
    <div class="label">Primary</div>
    <button class="btn btn-primary">Save link</button>
    <button class="btn btn-accent">
      <svg class="ic" viewBox="0 0 24 24"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
      Open original
    </button>
  </div>
  <div class="row">
    <div class="label">Secondary</div>
    <button class="btn btn-secondary">
      <svg class="ic" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Share
    </button>
    <button class="btn btn-secondary">
      <svg class="ic" viewBox="0 0 24 24"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/><line x1="12" y1="7" x2="12" y2="13"/><line x1="9" y1="10" x2="15" y2="10"/></svg>
      Add to collection
    </button>
  </div>
  <div class="row">
    <div class="label">Ghost</div>
    <button class="btn btn-ghost">Cancel</button>
    <button class="btn btn-danger">
      <svg class="ic" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      Delete
    </button>
    <button class="btn btn-secondary btn-disabled">Save link</button>
  </div>
  <div class="row">
    <div class="label">Small</div>
    <button class="btn btn-primary btn-sm">View memory</button>
    <button class="btn btn-secondary btn-sm">Undo</button>
    <button class="btn btn-ghost btn-sm">
      <svg class="ic" viewBox="0 0 24 24"><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/><path d="M21.378 5.626a1 1 0 1 0-3.004-3.004l-5.01 5.012a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506z"/></svg>
      Edit
    </button>
  </div>
</body></html>
